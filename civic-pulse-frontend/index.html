<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civic Pulse - Smart Civic Complaint Management</title>
  <meta name="description"
    content="Civic Pulse - A modern civic complaint management system. Report issues, track resolutions, and make your city better." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Configuration -->
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', 'system-ui', 'sans-serif'],
        display: ['Outfit', 'system-ui', 'sans-serif'],
      },

      colors: {
        primary: {
          50: '#ecfdf5',
          100: '#d1fae5',
          200: '#a7f3d0',
          300: '#6ee7b7',
          400: '#34d399',
          500: '#10b981',
          600: '#059669',
          700: '#047857',
          800: '#065f46',
          900: '#064e3b',
        },

        mint: {
          50: '#f0fdfa',
          100: '#ccfbf1',
          200: '#99f6e4',
          300: '#5eead4',
          400: '#2dd4bf',
          500: '#14b8a6',
        },

        surface: {
          100: '#ffffff',
          200: '#f8fafc',
          300: '#e2e8f0',
          400: '#cbd5f5'
        },

        slate: {
          750: '#293548',
          850: '#172033'
        }
      },

      boxShadow: {
        glass: '0 8px 32px rgba(16,185,129,0.1)',
        'glass-hover': '0 16px 48px rgba(16,185,129,0.15)',
        float: '0 20px 60px rgba(0,0,0,0.08)',
        'float-hover': '0 30px 80px rgba(0,0,0,0.12)',
        glow: '0 0 20px rgba(16,185,129,0.3)',
        'glow-lg': '0 0 40px rgba(16,185,129,0.4)',
        depth: '0 4px 12px rgba(0,0,0,0.04)',
        elevated: '0 12px 28px rgba(0,0,0,0.08)'
      },

      animation: {
        float: 'float 3s ease-in-out infinite',
        levitate: 'levitate 6s ease-in-out infinite',
        orbit: 'orbit 8s linear infinite',
        'pulse-glow': 'pulseGlow 3s ease-in-out infinite',
        'slide-up': 'slideUp 0.6s ease-out',
        'slide-in-right': 'slideInRight 0.5s ease-out',
        'fade-in': 'fadeIn 0.8s ease-out'
      },

      keyframes: {
        float: {
          '0%,100%': { transform: 'translateY(0px)' },
          '50%': { transform: 'translateY(-12px)' }
        },

        levitate: {
          '0%,100%': { transform: 'translateY(0px)' },
          '50%': { transform: 'translateY(-8px)' }
        },

        orbit: {
          '0%': { transform: 'rotate(0deg) translateX(40px) rotate(0deg)' },
          '100%': { transform: 'rotate(360deg) translateX(40px) rotate(-360deg)' }
        },

        pulseGlow: {
          '0%,100%': { boxShadow: '0 0 20px rgba(16,185,129,0.3)' },
          '50%': { boxShadow: '0 0 40px rgba(16,185,129,0.6)' }
        },

        slideUp: {
          '0%': { transform: 'translateY(30px)', opacity: '0' },
          '100%': { transform: 'translateY(0)', opacity: '1' }
        },

        slideInRight: {
          '0%': { transform: 'translateX(30px)', opacity: '0' },
          '100%': { transform: 'translateX(0)', opacity: '1' }
        },

        fadeIn: {
          '0%': { opacity: '0' },
          '100%': { opacity: '1' }
        }
      },

      backdropBlur: {
        xs: '2px'
      }
    }
  }
}
</script>

  <style type="text/tailwindcss">
    @layer utilities {
        .glass {
          background: rgba(255, 255, 255, 0.6);
          backdrop-filter: blur(20px) saturate(180%);
          -webkit-backdrop-filter: blur(20px) saturate(180%);
          border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-dark {
          background: rgba(15, 23, 42, 0.7);
          backdrop-filter: blur(20px) saturate(180%);
          -webkit-backdrop-filter: blur(20px) saturate(180%);
          border: 1px solid rgba(255,255,255, 0.08);
        }
        .glass-strong {
          background: rgba(255, 255, 255, 0.8);
          backdrop-filter: blur(40px) saturate(200%);
          -webkit-backdrop-filter: blur(40px) saturate(200%);
          border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .glass-sidebar {
          background: rgba(255, 255, 255, 0.65);
          backdrop-filter: blur(30px) saturate(190%);
          -webkit-backdrop-filter: blur(30px) saturate(190%);
          border-right: 1px solid rgba(255,255,255,0.3);
        }
        .gradient-text {
          background: linear-gradient(135deg, #10b981 0%, #14b8a6 50%, #06b6d4 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
        .gradient-text-gold {
          background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
      }
    </style>
</head>

<body class="font-sans antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
